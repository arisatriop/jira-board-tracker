apiVersion: apps/v1
kind: Deployment
metadata:
  name: poc-smmf-board
  namespace: apps          # ← FIXED: konsisten dengan Service & Ingress
  labels:
    app: poc-smmf-board
    environment: staging
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: poc-smmf-board
  template:
    metadata:
      labels:
        app: poc-smmf-board
        version: "${COMMIT_SHA}"
    spec:
      serviceAccountName: poc-smmf-board
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
        args:
          - "--port=5432"
          - "--private-ip"
          - "${CLOUD_SQL_INSTANCE}"
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          allowPrivilegeEscalation: false
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        livenessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 10
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
      - name: app
        image: ${IMAGE}
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http

        volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true

        envFrom:
        - secretRef:
            name: poc-smmf-board-secret

        startupProbe:           # ← ADDED: cegah liveness kill pod saat init
          httpGet:
            path: /health
            port: 3000
          failureThreshold: 10
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

      volumes:
      - name: config-volume
        configMap:
          name: poc-smmf-board-config
          items:
          - key: config.yaml
            path: config.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: poc-smmf-board-service
  namespace: apps
  labels:
    app: poc-smmf-board
    api-group: public
spec:
  selector:
    app: poc-smmf-board
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
    name: http
  type: ClusterIP
---
# Ingress for public APIs
# Routes: /api/*, /partner/*
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: poc-smmf-board-ingress
  namespace: apps
  labels:
    app: poc-smmf-board
  annotations:
    kubernetes.io/ingress.class: "gce"
    # Optional: force HTTPS redirect
    # networking.gke.io/managed-certificates: "poc-smmf-board-cert"
    # kubernetes.io/ingress.allow-http: "false"
spec:
  rules:
  - host: poc-smmf-board.sidejob.fun
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: poc-smmf-board-service
            port:
              number: 80
      - path: /partner
        pathType: Prefix
        backend:
          service:
            name: poc-smmf-board-service
            port:
              number: 80